    <text x="24" y="42" font-family="Arial" font-size="22" fill="#101828" font-weight="700">Inventory page after theme switch (Light)</text>
    <g transform="translate(485,30)" stroke="#1f2933" fill="none" stroke-width="2.8">
      <circle cx="0" cy="0" r="16"/>
      <circle cx="0" cy="-5" r="6.5"/>
      <path d="M -10,10 Q 0,2 10,10"/>
