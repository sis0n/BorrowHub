name: Monorepo CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  # Job 1: Check what parts of the monorepo have changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend-api/**'
            mobile:
              - 'mobile-app/**'

  # Job 2: Run Laravel Tests if backend files changed
  laravel-tests:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-api
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql, sqlite3
          coverage: none
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite
      - name: Setup Database Config for Tests
        run: |
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=borrowhub_db/DB_DATABASE=database\/database.sqlite/' .env
      - name: Run Migrations
        run: php artisan migrate --force
      - name: Execute Tests via PHPUnit
        run: php artisan test

  # Job 3: Run Android Tests if mobile files changed
  android-build-and-test:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Lint Check
        run: ./gradlew lintDebug
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
      - name: Build Debug APK
        run: ./gradlew assembleDebug

  # Job 4: Check if all PR conversations (including from gemini-code-assist) are resolved
  check-review-resolution:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved conversations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(jq -r .pull_request.number "$GITHUB_EVENT_PATH")
          fi
          
          echo "Checking PR #$PR_NUMBER for unresolved review conversations..."
          
          # Use GraphQL to find unresolved threads (more reliable for all review types)
          UNRESOLVED_COUNT=$(gh api graphql -F owner="${{ github.repository_owner }}" -F repo="${{ github.event.repository.name }}" -F pr="$PR_NUMBER" -f query='
            query($owner:String!, $repo:String!, $pr:Int!) {
              repository(owner:$owner, name:$repo) {
                pullRequest(number:$pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      isResolved
                    }
                  }
                }
              }
            }' --jq '.data.repository.pullRequest.reviewThreads.nodes | map(select(.isResolved == false)) | length')
          
          if [ "$UNRESOLVED_COUNT" -gt 0 ]; then
            echo "Error: There are $UNRESOLVED_COUNT unresolved review threads."
            echo "All conversations (including those from gemini-code-assist) must be resolved before merging."
            exit 1
          fi
          echo "All review conversations are resolved."

  # Job 5: A single status check that succeeds if all required jobs pass or are skipped
  # This is the ONLY job that should be marked as "Required" in Branch Protection
  ci-status-check:
    needs: [detect-changes, laravel-tests, android-build-and-test, check-review-resolution]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Overall Success
        run: |
          # Ensure detect-changes didn't fail
          if [[ "${{ needs.detect-changes.result }}" == "failure" || "${{ needs.detect-changes.result }}" == "cancelled" ]]; then
            echo "Detection of changes failed or was cancelled."
            exit 1
          fi

          # If any job failed or was cancelled, fail this check.
          if [[ "${{ needs.laravel-tests.result }}" == "failure" || "${{ needs.laravel-tests.result }}" == "cancelled" ]]; then
            echo "Laravel tests failed or were cancelled."
            exit 1
          fi
          if [[ "${{ needs.android-build-and-test.result }}" == "failure" || "${{ needs.android-build-and-test.result }}" == "cancelled" ]]; then
            echo "Android tests failed or were cancelled."
            exit 1
          fi
          
          # Check review resolution only for PR-related events
          if [[ "${{ github.event_name }}" != "push" ]]; then
            if [[ "${{ needs.check-review-resolution.result }}" == "failure" || "${{ needs.check-review-resolution.result }}" == "cancelled" ]]; then
              echo "Review resolution check failed or was cancelled. Please resolve all conversations (including from gemini-code-assist)."
              exit 1
            fi
          fi
          
          echo "All required tests passed or were correctly skipped."
          exit 0
